<div class="settings-container d-flex">
    <!-- Sidebar -->
    <div class="settings-sidebar bg-white shadow-sm p-4">
        <h4 class="mb-5 fw-bold text-primary d-flex align-items-center gap-2">
            <i class="bi bi-gear-fill"></i>
            <span>{{ 'SETTINGS.TITLE' | translate }}</span>
        </h4>
        <div class="list-group list-group-flush gap-2">
            <a routerLink="preferences" routerLinkActive="active"
                class="list-group-item list-group-item-action d-flex align-items-center gap-2 border-0 rounded-3">
                <i class="bi bi-sliders2"></i>
                <span>{{ 'SETTINGS.PREFERENCES' | translate }}</span>
            </a>
            <a routerLink="security" routerLinkActive="active"
                class="list-group-item list-group-item-action d-flex align-items-center gap-2 border-0 rounded-3">
                <i class="bi bi-shield-lock"></i>
                <span>{{ 'SETTINGS.SECURITY' | translate }}</span>
            </a>


        </div>
    </div>

    <!-- Main Content -->
    <div class="settings-content flex-grow-1 p-4 bg-light">
        <div class="card border-0 shadow-sm h-100">
            <div class="card-body">
                <router-outlet></router-outlet>
            </div>
        </div>
    </div>
</div>
