<h2 mat-dialog-title>{{ data.id ? 'Edit' : 'Add' }} Event</h2>
<mat-dialog-content class="dialog-content">
    <form [formGroup]="form">
        <div class="row">
            <mat-form-field appearance="outline" class="half-width">
                <mat-label>Name</mat-label>
                <i matPrefix class="bi bi-calendar-event input-icon"></i>
                <input matInput formControlName="nom" placeholder="Ex: Jazz Festival">
                <mat-error *ngIf="form.get('nom')?.hasError('required')">Name is required</mat-error>
            </mat-form-field>
            <mat-form-field appearance="outline" class="half-width">
                <mat-label>Location</mat-label>
                <i matPrefix class="bi bi-geo-alt input-icon"></i>
                <input matInput formControlName="lieu" placeholder="Ex: Casablanca">
                <mat-error *ngIf="form.get('lieu')?.hasError('required')">Location is required</mat-error>
            </mat-form-field>
        </div>

        <div class="row">
            <mat-form-field appearance="outline" class="half-width">
                <mat-label>Start Date</mat-label>
                <input matInput [matDatepicker]="startPicker" formControlName="dateDebut">
                <mat-datepicker-toggle matIconSuffix [for]="startPicker">
                    <i matDatepickerToggleIcon class="bi bi-calendar-check"></i>
                </mat-datepicker-toggle>
                <mat-datepicker #startPicker></mat-datepicker>
            </mat-form-field>

            <mat-form-field appearance="outline" class="half-width">
                <mat-label>End Date</mat-label>
                <input matInput [matDatepicker]="endPicker" formControlName="dateFin">
                <mat-datepicker-toggle matIconSuffix [for]="endPicker">
                    <i matDatepickerToggleIcon class="bi bi-calendar-x"></i>
                </mat-datepicker-toggle>
                <mat-datepicker #endPicker></mat-datepicker>
            </mat-form-field>
        </div>

        <div class="upload-section">
            <label>Event Image</label>
            <div class="file-upload-wrapper">
                <button type="button" mat-stroked-button (click)="fileInput.click()" [disabled]="isUploading">
                    <i class="bi bi-cloud-upload-fill"></i> {{ isUploading ? 'Uploading...' : 'Choose Image' }}
                </button>
                <input #fileInput type="file" (change)="onFileSelected($event)" style="display: none" accept="image/*">
            </div>

            <div class="image-preview" *ngIf="form.get('imageUrl')?.value">
                <img [src]="form.get('imageUrl')?.value" class="preview-img">
            </div>
        </div>

        <!-- Fallback if upload fails or manual entry needed -->
        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Image URL (Manual)</mat-label>
            <i matPrefix class="bi bi-link-45deg input-icon"></i>
            <input matInput formControlName="imageUrl">
        </mat-form-field>

        <div class="row">
            <mat-form-field appearance="outline" class="full-width">
                <mat-label>Event Type</mat-label>
                <i matPrefix class="bi bi-tag input-icon"></i>
                <mat-select formControlName="eventType">
                    <mat-option *ngFor="let type of eventTypes" [value]="type">
                        {{ type | titlecase }}
                    </mat-option>
                </mat-select>
                <mat-error *ngIf="form.get('eventType')?.hasError('required')">Event type is required</mat-error>
            </mat-form-field>
        </div>

        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Description</mat-label>
            <textarea matInput formControlName="description" rows="3"></textarea>
            <mat-error *ngIf="form.get('description')?.hasError('required')">Description is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Historique (Origines &amp; Histoire)</mat-label>
            <i matPrefix class="bi bi-book-half input-icon"></i>
            <textarea matInput formControlName="historique" rows="4" placeholder="Ex: Né en 2001, ce festival..."></textarea>
        </mat-form-field>
    </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button mat-dialog-close>Cancel</button>
    <button mat-raised-button color="primary" (click)="save()" [disabled]="form.invalid">
        <i class="bi bi-check-lg"></i> Save
    </button>
</mat-dialog-actions>
