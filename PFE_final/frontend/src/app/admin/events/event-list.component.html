<div class="admin-page-wrapper fade-in">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <div>
            <h1 class="fw-800 text-main mb-1">Event Management</h1>
            <p class="text-muted mb-0">Curate and organize platform events</p>
        </div>
        <button class="btn btn-primary rounded-pill px-4 fw-800" (click)="openDialog()">
            <i class="bi bi-plus-lg me-2"></i> Create Event
        </button>
    </div>

    <mat-card class="table-card shadow-sm border-0">
        <div class="table-header-box d-flex align-items-center justify-content-between p-4 border-bottom">
            <div class="search-wrapper position-relative w-100" style="max-width: 400px;">
                <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 opacity-50"></i>
                <input type="text" class="form-control ps-5 rounded-pill border-light bg-light fw-600"
                    (keyup)="applyFilter($event)" placeholder="Search events...">
            </div>
        </div>

        <div class="table-responsive">
            <table mat-table [dataSource]="dataSource" matSort class="w-100 custom-table">

                <!-- Image Column -->
                <ng-container matColumnDef="image">
                    <th mat-header-cell *matHeaderCellDef class="ps-4"> Cover </th>
                    <td mat-cell *matCellDef="let row" class="ps-4">
                        <img [src]="row.imageUrl" class="table-img shadow-sm" alt="event"
                            onerror="this.src='assets/placeholder.jpg'">
                    </td>
                </ng-container>

                <!-- Title Column -->
                <ng-container matColumnDef="title">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Title </th>
                    <td mat-cell *matCellDef="let row">
                        <span class="fw-800 text-main">{{row.nom}}</span>
                    </td>
                </ng-container>

                <!-- Date Column -->
                <ng-container matColumnDef="date">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Duration </th>
                    <td mat-cell *matCellDef="let row">
                        <div class="small fw-700 opacity-75">
                            {{row.dateDebut | date:'mediumDate'}} <i class="bi bi-arrow-right mx-1"></i> {{row.dateFin |
                            date:'mediumDate'}}
                        </div>
                    </td>
                </ng-container>

                <!-- Location Column -->
                <ng-container matColumnDef="location">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Venue </th>
                    <td mat-cell *matCellDef="let row" class="fw-600"> {{row.lieu}} </td>
                </ng-container>

                <!-- Price Column -->
                <ng-container matColumnDef="price">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Type </th>
                    <td mat-cell *matCellDef="let row">
                        <span class="price-pill">{{row.typeEvenement}}</span>
                    </td>
                </ng-container>

                <!-- Actions Column -->
                <ng-container matColumnDef="actions">
                    <th mat-header-cell *matHeaderCellDef class="pe-4 text-end"> Actions </th>
                    <td mat-cell *matCellDef="let row" class="pe-4 text-end">
                        <button class="btn btn-icon-soft me-2" (click)="openDialog(row)" title="Edit">
                            <i class="bi bi-pencil-square"></i>
                        </button>
                        <button class="btn btn-icon-soft text-danger" (click)="deleteEvent(row.id)" title="Delete">
                            <i class="bi bi-trash3-fill"></i>
                        </button>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

                <tr class="mat-row" *matNoDataRow>
                    <td class="mat-cell p-5 text-center" colspan="6">
                        <div class="opacity-50">
                            <i class="bi bi-calendar2-x fs-1"></i>
                            <p class="mt-2">No matching events found</p>
                        </div>
                    </td>
                </tr>
            </table>
        </div>

        <mat-paginator [pageSizeOptions]="[10, 25, 50]" class="border-top"></mat-paginator>
    </mat-card>
</div>
