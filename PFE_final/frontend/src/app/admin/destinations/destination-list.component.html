<div class="admin-page-wrapper fade-in">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <div>
            <h1 class="fw-800 text-main mb-1">Destinations</h1>
            <p class="text-muted mb-0">Manage all displayable locations on the platform</p>
        </div>
        <button class="btn btn-primary rounded-pill px-4 fw-800" (click)="openDialog()">
            <i class="bi bi-plus-lg me-2"></i> Create New
        </button>
    </div>

    <mat-card class="table-card shadow-sm border-0">
        <div class="table-header-box d-flex align-items-center justify-content-between p-4">
            <div class="search-wrapper position-relative w-100" style="max-width: 400px;">
                <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 opacity-50"></i>
                <input type="text" class="form-control ps-5 rounded-pill border-light bg-light fw-600"
                    (keyup)="applyFilter($event)" placeholder="Search destinations...">
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-light rounded-pill px-3 fw-700 small-btn"><i
                        class="bi bi-filter me-2"></i>Filter</button>
                <button class="btn btn-light rounded-pill px-3 fw-700 small-btn"><i
                        class="bi bi-download me-2"></i>Export</button>
            </div>
        </div>

        <div class="table-responsive">
            <table mat-table [dataSource]="dataSource" matSort class="w-100 custom-table">

                <!-- ID Column -->
                <ng-container matColumnDef="id">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header class="ps-4"> ID </th>
                    <td mat-cell *matCellDef="let row" class="ps-4 text-muted small fw-700"> #{{row.id}} </td>
                </ng-container>

                <!-- Image Column -->
                <ng-container matColumnDef="image">
                    <th mat-header-cell *matHeaderCellDef> Cover </th>
                    <td mat-cell *matCellDef="let row">
                        <img [src]="row.coverImage || row.thumbnailUrl || row.medias?.[0]?.url || 'assets/placeholder.jpg'"
                            class="table-img shadow-sm" alt="cover" onerror="this.src='assets/placeholder.jpg'">
                    </td>
                </ng-container>

                <!-- Name Column -->
                <ng-container matColumnDef="name">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
                    <td mat-cell *matCellDef="let row">
                        <span class="fw-800 text-main">{{row.nom}}</span>
                    </td>
                </ng-container>

                <!-- City Column -->
                <ng-container matColumnDef="city">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Region </th>
                    <td mat-cell *matCellDef="let row" class="fw-600"> {{row.type}} </td>
                </ng-container>

                <!-- Category Column -->
                <ng-container matColumnDef="category">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Category </th>
                    <td mat-cell *matCellDef="let row">
                        <span class="badge-soft">{{row.categorie}}</span>
                    </td>
                </ng-container>

                <!-- Status Column -->
                <ng-container matColumnDef="status">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Status </th>
                    <td mat-cell *matCellDef="let row">
                        <div class="status-indicator d-flex align-items-center gap-2">
                            <span class="dot dot-success"></span>
                            <span class="small fw-800 text-uppercase opacity-75">Active</span>
                        </div>
                    </td>
                </ng-container>

                <!-- Actions Column -->
                <ng-container matColumnDef="actions">
                    <th mat-header-cell *matHeaderCellDef class="pe-4 text-end"> Actions </th>
                    <td mat-cell *matCellDef="let row" class="pe-4 text-end">
                        <button class="btn btn-icon-soft me-2" (click)="openDialog(row)" title="Edit">
                            <i class="bi bi-pencil-square"></i>
                        </button>
                        <button class="btn btn-icon-soft text-danger" (click)="deleteDestination(row.id)"
                            title="Delete">
                            <i class="bi bi-trash3-fill"></i>
                        </button>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

                <tr class="mat-row" *matNoDataRow>
                    <td class="mat-cell p-5 text-center" colspan="7">
                        <div class="opacity-50">
                            <i class="bi bi-inbox fs-1"></i>
                            <p class="mt-2">No matching destinations found</p>
                        </div>
                    </td>
                </tr>
            </table>
        </div>

        <mat-paginator [pageSizeOptions]="[10, 25, 50]" class="border-top"></mat-paginator>
    </mat-card>
</div>
