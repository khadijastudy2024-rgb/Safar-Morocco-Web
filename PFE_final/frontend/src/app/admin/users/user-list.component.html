<div class="admin-page-wrapper fade-in">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <div>
            <h1 class="fw-800 text-main mb-1">User Management</h1>
            <p class="text-muted mb-0">Manage platform access and member roles</p>
        </div>
    </div>

    <mat-card class="table-card shadow-sm border-0">
        <div class="table-header-box d-flex align-items-center justify-content-between p-4 border-bottom">
            <div class="search-wrapper position-relative w-100" style="max-width: 400px;">
                <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 opacity-50"></i>
                <input type="text" class="form-control ps-5 rounded-pill border-light bg-light fw-600"
                    (keyup)="applyFilter($event)" placeholder="Search users by name or email...">
            </div>
        </div>

        <div class="table-responsive position-relative">
            <div class="loading-shade" *ngIf="isLoadingResults">
                <mat-spinner diameter="40"></mat-spinner>
            </div>
            <table mat-table [dataSource]="dataSource" matSort class="w-100 custom-table">

                <!-- ID Column -->
                <ng-container matColumnDef="id">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header class="ps-4"> ID </th>
                    <td mat-cell *matCellDef="let row" class="ps-4 text-muted small fw-700"> #{{row.id}} </td>
                </ng-container>

                <!-- Username Column -->
                <ng-container matColumnDef="username">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Username </th>
                    <td mat-cell *matCellDef="let row" class="fw-800 text-main"> {{row.nom}} </td>
                </ng-container>

                <!-- Email Column -->
                <ng-container matColumnDef="email">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Email Address </th>
                    <td mat-cell *matCellDef="let row" class="fw-600 opacity-75"> {{row.email}} </td>
                </ng-container>

                <!-- Role Column -->
                <ng-container matColumnDef="role">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Account Role </th>
                    <td mat-cell *matCellDef="let row">
                        <span class="role-badge" [class.admin]="row.role === 'ADMIN'">{{row.role}}</span>
                    </td>
                </ng-container>

                <!-- Actions Column -->
                <ng-container matColumnDef="actions">
                    <th mat-header-cell *matHeaderCellDef class="pe-4 text-end"> Actions </th>
                    <td mat-cell *matCellDef="let row" class="pe-4 text-end">
                        <button class="btn btn-icon-soft me-2" (click)="toggleRole(row)" title="Change Role">
                            <i class="bi bi-shield-lock-fill"></i>
                        </button>
                        <button class="btn btn-icon-soft text-danger" (click)="deleteUser(row.id)" title="Delete">
                            <i class="bi bi-person-x-fill"></i>
                        </button>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

                <tr class="mat-row" *matNoDataRow>
                    <td class="mat-cell p-5 text-center" colspan="5">
                        <div class="opacity-50">
                            <i class="bi bi-people fs-1"></i>
                            <p class="mt-2">No users found matching your criteria</p>
                        </div>
                    </td>
                </tr>
            </table>
        </div>

        <mat-paginator [pageSizeOptions]="[10, 25, 50]" class="border-top"></mat-paginator>
    </mat-card>
</div>
