<h2 mat-dialog-title>{{ data.id ? 'Edit' : 'Add' }} Destination</h2>
<mat-dialog-content class="dialog-content">
    <form [formGroup]="form">
        <div class="row">
            <mat-form-field appearance="outline" class="half-width">
                <mat-label>Destination Name</mat-label>
                <i matPrefix class="bi bi-geo-alt-fill input-icon"></i>
                <input matInput formControlName="nom" placeholder="Ex: Chefchaouen">
                <mat-error *ngIf="form.get('nom')?.hasError('required')">Name is required</mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline" class="half-width">
                <mat-label>Region/City</mat-label>
                <i matPrefix class="bi bi-building input-icon"></i>
                <input matInput formControlName="type" placeholder="Ex: Marrakech">
                <mat-error *ngIf="form.get('type')?.hasError('required')">Region is required</mat-error>
            </mat-form-field>
        </div>

        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Category</mat-label>
            <i matPrefix class="bi bi-tag-fill input-icon"></i>
            <mat-select formControlName="categorie">
                <mat-option value="Cultural">Cultural</mat-option>
                <mat-option value="Nature">Nature</mat-option>
                <mat-option value="Historical">Historical</mat-option>
                <mat-option value="Religious">Religious</mat-option>
                <mat-option value="Urban">Urban</mat-option>
            </mat-select>
        </mat-form-field>

        <div class="row">
            <mat-form-field appearance="outline" class="half-width">
                <mat-label>Latitude</mat-label>
                <input matInput type="number" formControlName="latitude" placeholder="31.6295" step="0.0001">
            </mat-form-field>

            <mat-form-field appearance="outline" class="half-width">
                <mat-label>Longitude</mat-label>
                <input matInput type="number" formControlName="longitude" placeholder="-7.9811" step="0.0001">
            </mat-form-field>
        </div>

        <div class="map-search-wrapper" style="margin-bottom: 10px; display: flex; gap: 10px;">
            <mat-form-field appearance="outline" style="flex: 1; margin-bottom: 0;">
                <mat-label>Search Location</mat-label>
                <i matPrefix class="bi bi-search input-icon"></i>
                <input matInput #locationSearch (keyup.enter)="searchLocation(locationSearch.value)">
            </mat-form-field>
            <button type="button" mat-stroked-button (click)="searchLocation(locationSearch.value)">
                Search
            </button>
        </div>

        <div id="map" class="map-container"></div>

        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Video URL (Optional)</mat-label>
            <i matPrefix class="bi bi-youtube input-icon"></i>
            <input matInput formControlName="videoUrl">
        </mat-form-field>

        <div class="upload-section">
            <label>Destination Images</label>
            <div class="file-upload-wrapper">
                <button type="button" mat-stroked-button (click)="fileInput.click()" [disabled]="isUploading">
                    <i class="bi bi-cloud-upload-fill"></i> {{ isUploading ? 'Uploading...' : 'Choose Images' }}
                </button>
                <input #fileInput type="file" (change)="onFileSelected($event)" style="display: none" accept="image/*"
                    multiple>
            </div>

            <!-- URL Input -->
            <div style="margin-top: 10px; display: flex; gap: 10px; align-items: center;">
                <mat-form-field appearance="outline" style="flex: 1; margin-bottom: 0;">
                    <mat-label>Or paste image URL</mat-label>
                    <input matInput #urlInput>
                </mat-form-field>
                <button type="button" mat-icon-button (click)="addImageUrl(urlInput.value); urlInput.value=''"
                    [disabled]="!urlInput.value">
                    <i class="bi bi-plus-lg"></i>
                </button>
            </div>

            <div class="image-preview-grid" *ngIf="existingImages.length > 0 || newFiles.length > 0">
                <!-- Existing Images -->
                <div *ngFor="let img of existingImages; let i = index" class="preview-item">
                    <img [src]="img" class="preview-img">
                    <button type="button" class="remove-img-btn" (click)="removeExistingImage(i)">
                        <i class="bi bi-x"></i>
                    </button>
                </div>
                <!-- New Files -->
                <div *ngFor="let item of newFiles; let i = index" class="preview-item new-file">
                    <img [src]="item.preview" class="preview-img">
                    <div class="new-badge">New</div>
                    <button type="button" class="remove-img-btn" (click)="removeNewFile(i)">
                        <i class="bi bi-x"></i>
                    </button>
                </div>
            </div>
        </div>

        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Description</mat-label>
            <textarea matInput formControlName="description" rows="5"></textarea>
            <mat-error *ngIf="form.get('description')?.hasError('required')">Description is required</mat-error>
        </mat-form-field>
    </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button (click)="onCancel()">Cancel</button>
    <button mat-raised-button color="primary" [disabled]="form.invalid || loading" (click)="onSave()">
        <i class="bi bi-check-lg"></i> {{ data.id ? 'Update' : 'Create' }}
    </button>
</mat-dialog-actions>
