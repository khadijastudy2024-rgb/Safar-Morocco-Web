<h2 mat-dialog-title>{{ 'DESTINATIONS.RESERVATION.TITLE' | translate:{name: data.offer.name} }}</h2>
<mat-dialog-content class="mat-typography pt-3">
    <!-- Error State -->
    <div class="alert alert-danger" *ngIf="errorMessage">
        <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ errorMessage }}
    </div>

    <!-- Main Form -->
    <form *ngIf="!errorMessage && myItineraries.length > 0">
        <div class="mb-3">
            <label class="form-label text-muted fw-bold">{{ 'DESTINATIONS.RESERVATION.SELECT_ITINERARY' | translate }}</label>
            <select class="form-select" [(ngModel)]="reservationData.itineraryId" name="itineraryId" required
                [disabled]="loading || isSaving">
                <option [ngValue]="null" disabled>{{ 'DESTINATIONS.RESERVATION.CHOOSE_ITINERARY' | translate }}</option>
                <option *ngFor="let it of myItineraries" [value]="it.id">{{ it.nom }}</option>
            </select>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label text-muted fw-bold">{{ 'DESTINATIONS.RESERVATION.START_DATE' | translate
                    }}</label>
                <input type="date" class="form-control" [(ngModel)]="reservationData.startDate" name="startDate"
                    required [disabled]="isSaving">
            </div>
            <div class="col-md-6 mb-3" *ngIf="data.offer.type === 'HOTEL' || data.offer.type === 'ACTIVITY'">
                <label class="form-label text-muted fw-bold">{{ 'DESTINATIONS.RESERVATION.END_DATE' | translate
                    }}</label>
                <input type="date" class="form-control" [(ngModel)]="reservationData.endDate" name="endDate"
                    [disabled]="isSaving">
            </div>
        </div>

        <div class="mb-3" *ngIf="data.offer.type !== 'HOTEL'">
            <label class="form-label text-muted fw-bold">{{ 'DESTINATIONS.RESERVATION.QUANTITY' | translate }}</label>
            <input type="number" class="form-control" [(ngModel)]="reservationData.quantity" name="quantity" min="1"
                required [disabled]="isSaving">
        </div>
    </form>

    <div class="alert alert-info" *ngIf="!errorMessage && !loading && myItineraries.length === 0">
        <i class="bi bi-info-circle-fill me-2"></i> {{ 'DESTINATIONS.RESERVATION.NO_ITINERARIES' | translate }}
        <a routerLink="/itineraries/create" (click)="onNoClick()" class="alert-link">{{ 'DESTINATIONS.RESERVATION.CREATE_ITINERARY_LINK' | translate }}</a>
    </div>

    <!-- Spinner for loading itineraries -->
    <div class="text-center my-4" *ngIf="loading && !errorMessage">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>
</mat-dialog-content>
<mat-dialog-actions align="end" class="pb-3 pe-3">
    <button mat-button (click)="onNoClick()" [disabled]="isSaving" class="btn btn-light rounded-pill px-4 me-2">{{
        'COMMON.CANCEL' | translate }}</button>
    <button mat-button (click)="onSubmit()" [disabled]="loading || isSaving"
        class="btn btn-primary rounded-pill px-4 shadow-sm" cdkFocusInitial>
        <span *ngIf="!isSaving">{{ 'DESTINATIONS.RESERVATION.CONFIRM' | translate }}</span>
        <span *ngIf="isSaving">
            <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
            {{ 'DESTINATIONS.RESERVATION.CONFIRMING' | translate }}
        </span>
    </button>
</mat-dialog-actions>
